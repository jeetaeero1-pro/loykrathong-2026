<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPALL สายงานบัญชีและการเงินลอยกระทงออนไลน์ 🪷✨</title>
    <!-- นำเข้า Google Fonts อักษรน่ารักแบบไทยๆ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Mitr:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Chakra Petch', 'Mitr', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050814;
        }

        /* 📸 ส่วนจัดวางภาพพื้นหลังอลังการจากภาพ Gemini_Generated_Image_2ype4g2ype4g2ype.png */
        .festival-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* ดึงภาพพื้นหลังมาใส่แบบครอบคลุมเต็มพื้นที่ สวยงาม ไม่บิดเบี้ยว */
/* แก้ไขให้ดึงภาพสุโขทัยมาใช้โดยตรง 🛕 */
background-image: url('Gemini_Generated_Image_2ype4g2ype4g2ype.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
        }

        /* 🌊 โซนแม่น้ำสำหรับรองรับกระทงลอย (จัดพิกัดให้พอดีกับผืนน้ำในภาพ) */
        .river {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%; /* ปรับพื้นที่ให้กระทงวิ่งเฉพาะบริเวณครึ่งจอล่างที่เป็นผืนน้ำ */
            z-index: 2;
            overflow: hidden;
        }

        /* 🪷 ตัวกระทงและการลอยต่อเนื่องไม่หยุด */
        .krathong-item {
            position: absolute;
            cursor: pointer;
            animation: riverFlow var(--flow-speed) linear infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            z-index: 3;
        }

        @keyframes riverFlow {
            0% { transform: translateX(-220px) translateY(0); }
            50% { transform: translateX(calc(50vw)) translateY(var(--wave-move)); }
            100% { transform: translateX(calc(100vw + 220px)) translateY(0); }
        }

        /* แสงเทียนบนกระทงดิจิทัล */
        .candle-glow {
            width: 8px;
            height: 18px;
            background: radial-gradient(ellipse at bottom, #fff 20%, #ffea75 60%, #ff5722 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px #ffea75, 0 0 18px #ff5722;
            animation: candleWobble 0.5s infinite alternate;
            margin-bottom: -4px;
            z-index: 4;
        }
        @keyframes candleWobble {
            0% { transform: scaleX(1) rotate(-3deg); }
            100% { transform: scaleX(0.85) rotate(4deg); }
        }

        /* ดีไซน์รูปทรงกระทงพรีเมียม */
        .krathong-visual {
            width: 80px;
            height: 45px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .type-classic { background: radial-gradient(ellipse at top, #78e08f 20%, #296d3b 80%); border-radius: 50% 50% 45% 45%; border: 2px solid #1a4324; }
        .type-classic::before { content: "🌸"; position: absolute; top: -10px; left: 22px; font-size: 24px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        
        .type-lotus { background: radial-gradient(ellipse at top, #ffb6c1 10%, #f368e0 80%); border-radius: 48% 48% 50% 50%; border: 1px solid #c842b2; }
        .type-lotus::before { content: "💛"; position: absolute; top: -6px; left: 27px; font-size: 16px; }

        .type-flower { background: radial-gradient(ellipse at top, #fff2a3 30%, #ff9f43 90%); border-radius: 50%; border-bottom: 5px solid #b36518; }
        .type-flower::before { content: "✨"; position: absolute; top: -11px; left: 24px; font-size: 22px; }

        .type-pastel { background: linear-gradient(135deg, #70e1f5 0%, #ffd194 100%); border-radius: 40% 40% 50% 50%; border: 1px solid #55b2c4; }
        .type-pastel::before { content: "💝"; position: absolute; top: -8px; left: 26px; font-size: 18px; }

        /* 📜 ป้ายคำอธิษฐานเหนือน้ำ (แสดงผลเต็มตา ไม่ตัดคำ) */
        .wish-text {
            color: #fffbe0;
            font-size: 13px;
            font-weight: 600;
            background: rgba(7, 14, 29, 0.9);
            padding: 5px 12px;
            border-radius: 14px;
            margin-top: 7px;
            text-align: center;
            border: 1px solid #f1c40f;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            white-space: normal;
            width: max-content;
            max-width: 180px;
            word-wrap: break-word;
        }

        /* 👤 กล่องชื่อพนักงานเมื่อชี้/สัมผัส */
        .owner-tooltip {
            position: absolute;
            bottom: 110%;
            background: linear-gradient(135deg, #00843D, #F7931E);
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 1000;
        }
        .krathong-item:hover .owner-tooltip, .krathong-item:active .owner-tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* 📋 ฟอร์มกรอกข้อมูลสไตล์โมเดิร์น */
        .form-panel {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(11, 19, 43, 0.94);
            border: 2px solid #00843D;
            padding: 22px;
            border-radius: 18px;
            width: 92%;
            max-width: 390px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            z-index: 10;
            backdrop-filter: blur(8px);
            text-align: center;
            transition: all 0.3s ease;
        }
        .form-panel h2 { color: #f1c40f; margin-bottom: 15px; font-size: 21px; font-weight: 700; }
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { color: #ffeedd; display: block; margin-bottom: 5px; font-size: 13px; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.08);
            border: 1px solid #556781; border-radius: 8px; color: #fff; font-size: 14px; outline: none;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: #00843D; background: rgba(255,255,255,0.12); }
        
        /* 🎨 เมนูเลือกรูปแบบกระทง */
        .krathong-selector {
            display: flex;
            justify-content: space-between;
            margin: 12px 0 18px 0;
            gap: 8px;
        }
        .select-option {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 2px solid #556781;
            border-radius: 10px;
            padding: 8px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .select-option span { font-size: 20px; }
        .select-option p { color: #ccc; font-size: 11px; }
        .select-option.active {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.15);
        }
        .select-option.active p { color: #f39c12; font-weight: bold; }

        .btn-submit {
            width: 100%; padding: 12px; background: linear-gradient(to right, #00843D, #e67e22);
            border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        .btn-reopen {
            position: absolute; bottom: 20px; right: 20px;
            background: linear-gradient(to right, #00843D, #F7931E);
            color: #fff; border: none; padding: 11px 20px; font-weight: bold;
            border-radius: 25px; font-size: 14px; z-index: 20; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: none;
        }

        /* 📱 ปรับหน้าจอเมื่อใช้งานบน Mobile */
        @media (max-width: 600px) {
            .cpall-logo { top: 20px; font-size: 20px; }
            .form-panel {
                top: auto; bottom: 15px; transform: translate(-50%, 0);
                padding: 15px; border-radius: 14px;
            }
            .form-panel h2 { font-size: 18px; margin-bottom: 8px; }
            .input-group { margin-bottom: 8px; }
            .input-group input, .input-group textarea { padding: 8px; font-size: 13px; }
            .krathong-selector { margin: 8px 0 12px 0; }
            .select-option { padding: 6px 0; }
            .select-option span { font-size: 16px; }
            .select-option p { font-size: 10px; }
            .btn-submit { padding: 10px; font-size: 14px; }
            .river { height: 45%; }
        }
    </style>
</head>
<body>

    <div class="festival-container">

        <!-- ปุ่มสำหรับเรียกฟอร์มกรอกคำอธิษฐานคืนมาบนมือถือ -->
        <button class="btn-reopen" id="reopenBtn" onclick="toggleForm(true)">🪷 ขอพรลอยกระทงเพิ่ม</button>

        <!-- หน้าต่างกรอกข้อมูล -->
        <div class="form-panel" id="inputForm">
            <h2>🪷 7-11 ลอยกระทงออนไลน์ 🪷</h2>
            <div class="input-group">
                <label>ชื่อพนักงาน / รหัสสาขา / แผนก</label>
                <input type="text" id="empName" placeholder="ระบุชื่อของคุณ..." required maxlength="30">
            </div>
            <div class="input-group">
                <label>คำอธิษฐานขอพร</label>
                <textarea id="empWish" rows="2" placeholder="ขอให้ปีนี้งานปัง ยอดขายทะลุเป้า ร่ำรวย..." required maxlength="70"></textarea>
            </div>
            
            <label style="color: #ffeedd; display: block; text-align: left; font-size: 13px;">เลือกรูปแบบกระทง</label>
            <div class="krathong-selector">
                <div class="select-option active" onclick="selectStyle('classic', this)">
                    <span>🌸</span><p>ใบตอง</p>
                </div>
                <div class="select-option" onclick="selectStyle('lotus', this)">
                    <span>🪷</span><p>กลีบบัว</p>
                </div>
                <div class="select-option" onclick="selectStyle('flower', this)">
                    <span>✨</span><p>ดอกไม้ทอง</p>
                </div>
                <div class="select-option" onclick="selectStyle('pastel', this)">
                    <span>💝</span><p>พาสเทล</p>
                </div>
            </div>

            <button class="btn-submit" onclick="launchKrathong()">ปล่อยกระทงลงแม่น้ำ ✨</button>
        </div>

        <!-- โซนแม่น้ำ (กระทงจะวิ่งผ่านผืนน้ำในรูปภาพ) -->
        <div class="river" id="riverWater"></div>
    </div>

    <!-- ส่วนเชื่อมต่อหลังบ้าน Firebase REALTIME -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbzu_Uzb_ea2A5d2ooneJcdTZWMaLomm4",
            authDomain: "loikatong.firebaseapp.com",
            projectId: "loikatong",
            storageBucket: "loikatong.firebasestorage.app",
            messagingSenderId: "444623044937",
            appId: "1:444623044937:web:270338a9de2bb36c1fda98",
            measurementId: "G-CGR2MG02E8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedKrathongStyle = 'classic';
        window.selectStyle = function(styleName, element) {
            selectedKrathongStyle = styleName;
            document.querySelectorAll('.select-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }

        window.launchKrathong = async function() {
            const nameInput = document.getElementById('empName').value.trim();
            const wishInput = document.getElementById('empWish').value.trim();

            if(!nameInput || !wishInput) {
                alert('กรุณากรอกชื่อและคำอธิษฐานก่อนนะคะ 😊');
                return;
            }

            try {
                await addDoc(collection(db, "krathongs"), {
                    name: nameInput,
                    wish: wishInput,
                    styleType: selectedKrathongStyle,
                    timestamp: new Date().getTime()
                });

                document.getElementById('empWish').value = '';
                toggleForm(false);
            } catch (e) {
                console.error("Error: ", e);
                alert("ระบบขัดข้องชั่วคราว");
            }
        }

        const q = query(collection(db, "krathongs"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    renderKrathong(data.name, data.wish, data.styleType);
                }
            });
        });
    </script>

    <script>
        function toggleForm(show) {
            const form = document.getElementById('inputForm');
            const reopenBtn = document.getElementById('reopenBtn');
            if (show) {
                form.style.display = 'block';
                reopenBtn.style.display = 'none';
            } else {
                form.style.display = 'none';
                reopenBtn.style.display = 'block';
            }
        }

        // ฟังก์ชันวาดกระทงและเปิดระบบให้ลอยไหลเวียนแบบไร้ขีดจำกัด
        function renderKrathong(name, wish, styleType) {
            const river = document.getElementById('riverWater');
            const item = document.createElement('div');
            item.className = 'krathong-item';

            // สุ่มพิกัดความสูงให้อยู่ในโซนผืนน้ำด้านล่าง
            const randomTop = Math.random() * 65 + 15;
            item.style.top = randomTop + '%';

            // ความเร็วเฉลี่ยไหลเอื่อยๆ ต่อเนื่องนุ่มนวล
            const speed = Math.random() * 15 + 28; 
            item.style.setProperty('--flow-speed', speed + 's');
            item.style.setProperty('--wave-move', (Math.random() * 20 - 10) + 'px');

            // ใส่ Perspective ให้กระทงที่อยู่ไกลตัวดูเล็ก-ใกล้ตัวดูใหญ่ขึ้น
            const scaleValue = 0.45 + (randomTop / 140);
            item.style.transform = `scale(${scaleValue})`;

            item.innerHTML = `
                <div class="owner-tooltip">เจ้าของกระทง: ${name}</div>
                <div class="candle-glow"></div>
                <div class="krathong-visual type-${styleType || 'classic'}"></div>
                <div class="wish-text">${wish}</div>
            `;

            river.appendChild(item);
        }
    </script>
</body>
</html>

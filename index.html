<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ลอยกระทงออนไลน์สายงานบัญชีและการเงิน 🪷✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Mitr:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Chakra Petch', 'Mitr', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050814;
        }

        /* 📸 ส่วนจัดวางภาพพื้นหลัง */
        .festival-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-image: url('Gemini_Generated_Image_2ype4g2ype4g2ype.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
        }

        /* 📜 บอร์ดชาร์ตใสแสดงประวัติผู้โชคดี (History) มุมซ้ายบน */
        .winner-history-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 90;
            background: rgba(11, 19, 43, 0.65);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 12px;
            padding: 12px;
            width: 230px;
            max-height: 180px;
            overflow-y: auto;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .winner-history-panel h3 {
            color: #f1c40f;
            font-size: 13px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 4px;
            text-align: center;
        }
        .history-list {
            list-style: none;
            font-size: 11.5px;
            color: #fff;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }
        .history-date { color: #8892b0; }
        .history-name { color: #2ecc71; font-weight: 600; text-align: right; width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 🏆 Pop-Up ประกาศผู้โชคดีด้านบนจอกลาง */
        .winner-popup {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            z-index: 200;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            border: 2px solid #fff;
            padding: 12px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(241, 196, 15, 0.5);
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            width: 90%;
            max-width: 450px;
        }
        .winner-popup.show {
            transform: translateX(-50%) translateY(0);
        }
        .winner-popup h2 { color: #111; font-size: 15px; font-weight: 800; text-shadow: 0 1px 1px rgba(255,255,255,0.5); }
        .winner-popup p { color: #7e0000; font-size: 18px; font-weight: bold; margin-top: 2px; }

        /* 🌊 โซนแม่น้ำสำหรับรองรับกระทงลอย */
        .river {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 2;
            overflow: hidden;
        }

        /* 🪷 ตัวกระทงและการลอยต่อเนื่อง */
        .krathong-item {
            position: absolute;
            cursor: pointer;
            animation: riverFlow var(--flow-speed) linear infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            z-index: 3;
        }

        @keyframes riverFlow {
            0% { transform: translateX(-220px) translateY(0); }
            50% { transform: translateX(calc(50vw)) translateY(var(--wave-move)); }
            100% { transform: translateX(calc(100vw + 220px)) translateY(0); }
        }

        /* 🕯️ คอมโปเนนต์สำหรับจัดวางเทียนและประกายแสงให้อยู่เหนือน้ำประกอบกับตัวรูป */
        .krathong-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🕯️ ตัวแท่งเทียน */
        .real-candle {
            position: absolute;
            bottom: 60px; /* ดันแท่งเทียนขึ้นไปปักบนกระทง */
            width: 6px;
            height: 28px;
            background: linear-gradient(to right, #ffee55, #f39c12);
            border-radius: 2px;
            z-index: 4;
        }

        /* 🔥 เปลวไฟเทียนและประกายแสงประกายวิบวับ */
        .real-flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 18px;
            background: radial-gradient(circle at bottom, #ffffff 10%, #ffaa00 40%, rgba(255, 0, 0, 0) 80%);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            animation: flameGlow 0.8s ease-in-out infinite alternate;
            box-shadow: 0 0 15px #ffaa00, 0 0 25px #ff5500;
        }

        @keyframes flameGlow {
            0% { transform: translateX(-50%) scale(0.9) rotate(-2deg); opacity: 0.85; }
            100% { transform: translateX(-50%) scale(1.1) rotate(2deg); opacity: 1; box-shadow: 0 0 22px #ffaa00, 0 0 35px #ff5500; }
        }

        /* 🖼️ รูปภาพกระทงหลัก */
        .krathong-visual {
            width: 100px;
            height: auto;
            max-height: 85px;
            object-fit: contain;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
            z-index: 3;
        }

        /* 📜 ป้ายคำอธิษฐานเหนือน้ำ */
        .wish-text {
            color: #fffbe0;
            font-size: 13px;
            font-weight: 600;
            background: rgba(7, 14, 29, 0.9);
            padding: 5px 12px;
            border-radius: 14px;
            margin-top: 6px;
            text-align: center;
            border: 1px solid #f1c40f;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            white-space: normal;
            width: max-content;
            max-width: 180px;
            word-wrap: break-word;
            z-index: 5;
        }

        /* 👤 กล่องชื่อพนักงานเมื่อชี้/สัมผัส */
        .owner-tooltip {
            position: absolute;
            bottom: 115%;
            background: linear-gradient(135deg, #00843D, #F7931E);
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 1000;
        }
        .krathong-item:hover .owner-tooltip, .krathong-item:active .owner-tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* 📋 กล่องกรอกข้อมูลลอยอยู่ตรงกลางจอ */
        .form-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(11, 19, 43, 0.95);
            border: 2px solid #00843D;
            padding: 25px;
            border-radius: 18px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7), 0 0 20px rgba(0, 132, 61, 0.2);
            z-index: 100;
            backdrop-filter: blur(10px);
            text-align: center;
            transition: all 0.3s ease;
        }
        .form-panel h2 { color: #f1c40f; margin-bottom: 15px; font-size: 20px; font-weight: 700; }
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { color: #ffeedd; display: block; margin-bottom: 5px; font-size: 13px; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 11px; background: rgba(255,255,255,0.08);
            border: 1px solid #556781; border-radius: 8px; color: #fff; font-size: 14px; outline: none;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: #00843D; background: rgba(255,255,255,0.12); }
        
        /* 🎨 เมนูเลือกรูปแบบกระทง */
        .krathong-selector {
            display: flex;
            justify-content: space-between;
            margin: 12px 0 18px 0;
            gap: 6px;
        }
        .select-option {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 2px solid #556781;
            border-radius: 10px;
            padding: 6px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .select-option img { width: 45px; height: 40px; object-fit: contain; }
        .select-option p { color: #ccc; font-size: 11px; white-space: nowrap; }
        .select-option.active {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.15);
        }
        .select-option.active p { color: #f39c12; font-weight: bold; }

        .btn-submit {
            width: 100%; padding: 12px; background: linear-gradient(to right, #00843D, #e67e22);
            border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        .btn-reopen {
            position: absolute; bottom: 20px; right: 20px;
            background: linear-gradient(to right, #00843D, #F7931E);
            color: #fff; border: none; padding: 11px 20px; font-weight: bold;
            border-radius: 25px; font-size: 14px; z-index: 20; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: none;
        }

        /* 📱 จัดหน้าจอมือถือ */
        @media (max-width: 600px) {
            .winner-history-panel { top: 20px; left: 15px; width: 180px; max-height: 120px; padding: 8px; }
            .winner-history-panel h3 { font-size: 11px; margin-bottom: 4px; }
            .history-list { font-size: 10px; }
            .winner-popup { padding: 8px 15px; top: 10px; max-width: 90%; }
            .winner-popup h2 { font-size: 13px; }
            .winner-popup p { font-size: 15px; }
            .form-panel {
                width: 94%;
                padding: 16px;
                top: 50%;
                transform: translate(-50%, -50%); 
            }
            .form-panel h2 { font-size: 18px; margin-bottom: 10px; }
            .input-group { margin-bottom: 8px; }
            .input-group input, .input-group textarea { padding: 9px; font-size: 13px; }
            .krathong-selector { margin: 8px 0 12px 0; gap: 4px; }
            .select-option { padding: 4px 0; }
            .select-option img { width: 35px; height: 32px; }
            .select-option p { font-size: 9.5px; }
            .btn-submit { padding: 11px; font-size: 15px; }
            .river { height: 45%; }
            .krathong-visual { width: 75px; max-height: 65px; }
            .real-candle { bottom: 48px; height: 22px; width: 5px; }
        }
    </style>
</head>
<body>

    <div class="festival-container">
        <!-- บอร์ดประวัติผู้โชคดี -->
        <div class="winner-history-panel">
            <h3>🏆 ประวัติผู้โชคดีประจำวัน</h3>
            <ul class="history-list" id="historyList"></ul>
        </div>

        <!-- Pop-Up ประกาศรางวัล -->
        <div class="winner-popup" id="winnerAlert">
            <h2>🎉 ยินดีด้วยกับผู้โชคดีประจำวัน 🎉</h2>
            <p id="winnerNameDisplay">กำลังสุ่มหาผู้โชคดี...</p>
        </div>

        <button class="btn-reopen" id="reopenBtn" onclick="toggleForm(true)">🪷 ขอพรลอยกระทงเพิ่ม</button>

        <!-- ฟอร์มกรอกข้อมูลลอยกระทง -->
        <div class="form-panel" id="inputForm">
            <h2>🪷 ลอยกระทงออนไลน์สายงานบัญชีและการเงิน 🪷</h2>
            
            <div class="input-group">
                <label>ชื่อพนักงาน (ภาษาไทยเท่านั้น)</label>
                <!-- 🛠️ ตรวจสอบแบบ Realtime ให้กรอกได้เฉพาะภาษาไทยและเว้นวรรคเท่านั้น -->
                <input type="text" id="empName" placeholder="ระบุชื่อภาษาไทย..." required maxlength="30" oninput="this.value = this.value.replace(/[^ก-๙\s]/g, '')">
            </div>
            
            <div class="input-group">
                <label>รหัสพนักงาน 7 หลัก (ตัวเลขเท่านั้น)</label>
                <!-- 🛠️ ตรวจสอบให้กรอกได้เฉพาะตัวเลขและจำกัดสิทธิ์สูงสุดแค่ 7 ตัวอักษรเท่านั้น -->
                <input type="text" id="empId" placeholder="ระบุรหัสพนักงาน 7 หลัก..." required maxlength="7" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            
            <div class="input-group">
                <label>คำอธิษฐานขอพร (กรอกตัวเลข ตัวอักษร หรืออักขระพิเศษได้อิสระ)</label>
                <!-- 🛠️ ช่องคำอธิษฐานพิมพ์ตัวเลข สัญลักษณ์ ภาษาอังกฤษ หรือภาษาไทยได้ครบเต็มที่ -->
                <textarea id="empWish" rows="2" placeholder="ขอให้ปีนี้งานปัง ยอดขายทะลุเป้า ร่ำรวย..." required maxlength="70"></textarea>
            </div>
            
            <label style="color: #ffeedd; display: block; text-align: left; font-size: 13px;">เลือกรูปแบบกระทง</label>
            <div class="krathong-selector">
                <div class="select-option active" onclick="selectStyle('Employee.jpg', this)">
                    <img src="./Employee.jpg" alt="คนสู้ชีวิต">
                    <p>คนสู้ชีวิต</p>
                </div>
                <div class="select-option" onclick="selectStyle('Doc.jpg', this)">
                    <img src="./Doc.jpg" alt="กองเอกสาร">
                    <p>กองเอกสาร</p>
                </div>
                <div class="select-option" onclick="selectStyle('Pink.jpg', this)">
                    <img src="./Pink.jpg" alt="บัวชมพู">
                    <p>บัวชมพู</p>
                </div>
                <div class="select-option" onclick="selectStyle('Green.png', this)">
                    <img src="./Green.png" alt="ใบตองเขียว">
                    <p>ใบตองเขียว</p>
                </div>
            </div>

            <button class="btn-submit" onclick="launchKrathong()">ปล่อยกระทงลงแม่น้ำ ✨</button>
        </div>

        <div class="river" id="riverWater"></div>
    </div>

    <!-- ส่วนเชื่อมต่อหลังบ้าน Firebase REALTIME -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbzu_Uzb_ea2A5d2ooneJcdTZWMaLomm4",
            authDomain: "loikatong.firebaseapp.com",
            projectId: "loikatong",
            storageBucket: "loikatong.firebasestorage.app",
            messagingSenderId: "444623044937",
            appId: "1:444623044937:web:270338a9de2bb36c1fda98",
            measurementId: "G-CGR2MG02E8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let participantsList = []; 

        let selectedKrathongStyle = 'Employee.jpg'; 
        window.selectStyle = function(styleName, element) {
            selectedKrathongStyle = styleName;
            document.querySelectorAll('.select-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }

        window.launchKrathong = async function() {
            const nameInput = document.getElementById('empName').value.trim();
            const idInput = document.getElementById('empId').value.trim();
            const wishInput = document.getElementById('empWish').value.trim();

            if(!nameInput || !idInput || !wishInput) {
                alert('กรุณากรอกข้อมูล ชื่อ รหัสพนักงาน และคำอธิษฐานให้ครบถ้วนนะคะ 😊');
                return;
            }

            // 🛠️ Double Check ความถูกต้องสุดท้ายก่อนอัปเดตลงฐานข้อมูล
            if(idInput.length !== 7) {
                alert('❌ รหัสพนักงานจะต้องมีความยาวเป็นตัวเลข 7 หลักพอดีเป๊ะค่ะ รบกวนตรวจสอบอีกครั้งนะคะ');
                return;
            }

            const thaiRegex = /^[ก-๙\s]+$/;
            if(!thaiRegex.test(nameInput)) {
                alert('❌ ช่องชื่อพนักงานกรอกได้เฉพาะตัวอักษรภาษาไทยเท่านั้นค่ะ');
                return;
            }

            try {
                const krathongRef = collection(db, "krathongs");
                const qCheck = query(krathongRef, where("employeeId", "==", idInput));
                const querySnapshot = await getDocs(qCheck);

                if (!querySnapshot.empty) {
                    alert('❌ รหัสพนักงานนี้เคยใช้ลอยกระทงไปแล้วค่ะ ไม่สามารถลอยซ้ำได้อีก มารอร่วมลุ้นรางวัลใหญ่ด้วยกันนะคะ!');
                    return;
                }

                await addDoc(collection(db, "krathongs"), {
                    name: nameInput,
                    employeeId: idInput,
                    wish: wishInput,
                    styleType: selectedKrathongStyle, 
                    timestamp: new Date().getTime()
                });

                document.getElementById('empName').value = '';
                document.getElementById('empId').value = '';
                document.getElementById('empWish').value = '';
                toggleForm(false);
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("ระบบเชื่อมต่อขัดข้องชั่วคราว กรุณาลองใหม่อีกครั้งค่ะ");
            }
        }

        const qKrathong = query(collection(db, "krathongs"), orderBy("timestamp", "asc"));
        onSnapshot(qKrathong, (snapshot) => {
            participantsList = [];
            snapshot.docs.forEach((doc) => {
                const data = doc.data();
                participantsList.push(data.name); 
            });
            
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    renderKrathong(data.name, data.wish, data.styleType);
                }
            });
        });

        const qLucky = query(collection(db, "lucky_winners"), orderBy("drawTime", "desc"));
        onSnapshot(qLucky, (snapshot) => {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            snapshot.docs.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span class="history-date">${data.dateStr}</span>
                    <span class="history-name">คุณ ${data.winnerName}</span>
                `;
                historyList.appendChild(li);
            });
        });

        async function checkLuckyDrawTime() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const dateStr = now.toLocaleDateString('th-TH', {day: '2-digit', month: '2-digit', year: 'numeric'});

            if (currentHour === 17 && currentMinute >= 20 && currentMinute < 25) {
                const luckyRef = collection(db, "lucky_winners");
                const snapshot = await getDocs(luckyRef);
                let todayWinner = null;
                
                snapshot.forEach(doc => {
                    if(doc.data().dateStr === dateStr) {
                        todayWinner = doc.data().winnerName;
                    }
                });

                if (!todayWinner && participantsList.length > 0) {
                    const randomIndex = Math.floor(Math.random() * participantsList.length);
                    const luckyName = participantsList[randomIndex];
                    
                    await addDoc(collection(db, "lucky_winners"), {
                        winnerName: luckyName,
                        dateStr: dateStr,
                        drawTime: now.getTime()
                    });
                    todayWinner = luckyName;
                }

                if (todayWinner) {
                    document.getElementById('winnerNameDisplay').innerText = `คุณ ${todayWinner} 🏆`;
                    document.getElementById('winnerAlert').classList.add('show');
                }
            } else {
                document.getElementById('winnerAlert').classList.remove('show');
            }
        }

        setInterval(checkLuckyDrawTime, 10000);
        checkLuckyDrawTime();
    </script>

    <script>
        function toggleForm(show) {
            const form = document.getElementById('inputForm');
            const reopenBtn = document.getElementById('reopenBtn');
            if (show) {
                form.style.display = 'block';
                reopenBtn.style.display = 'none';
            } else {
                form.style.display = 'none';
                reopenBtn.style.display = 'block';
            }
        }

        function renderKrathong(name, wish, styleType) {
            const river = document.getElementById('riverWater');
            const item = document.createElement('div');
            item.className = 'krathong-item';

            const randomTop = Math.random() * 65 + 15;
            item.style.top = randomTop + '%';

            // 🛠️ ปรับความเร็วการไหลของแม่น้ำให้อืดและช้าลงอย่างเห็นได้ชัด (เดิมอยู่ที่ 28s - 43s ปรับใหม่เป็น 50s - 75s)
            const speed = Math.random() * 25 + 50; 
            item.style.setProperty('--flow-speed', speed + 's');
            item.style.setProperty('--wave-move', (Math.random() * 20 - 10) + 'px');

            const scaleValue = 0.45 + (randomTop / 140);
            item.style.transform = `scale(${scaleValue})`;

            let imgFile = styleType || 'Employee.jpg';
            
            // 🛠️ ปรับโครงสร้าง HTML ข้างในให้มี Wrapper เพื่อแสดงแท่งเทียนพร้อมประกายไฟสลัวลอยติดตัวรูปภาพไปด้วยกัน
            item.innerHTML = `
                <div class="owner-tooltip">กระทงของ: คุณ${name}</div>
                <div class="krathong-wrapper">
                    <div class="real-candle">
                        <div class="real-flame"></div>
                    </div>
                    <img src="./${imgFile}" class="krathong-visual" alt="กระทง">
                </div>
                <div class="wish-text">${wish}</div>
            `;

            river.appendChild(item);
        }
    </script>
</body>
</html>
